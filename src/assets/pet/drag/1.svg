<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <!-- Body (stretched horizontally) -->
  <ellipse cx="60" cy="80" rx="48" ry="20" fill="#D4A574"/>
  <!-- Belly (stretched) -->
  <ellipse cx="60" cy="84" rx="30" ry="14" fill="#F5EDE4"/>
  <!-- Body stripes (stretched) -->
  <path d="M30 70 Q40 66 50 70" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M26 76 Q36 72 46 76" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M28 82 Q38 79 48 82" stroke="#C49668" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M70 70 Q80 66 90 70" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M72 76 Q82 72 92 76" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Tail (stretched back) -->
  <path d="M108 78 Q116 72 118 60 Q119 50 114 52 Q110 54 112 64 Q114 72 108 76" fill="#D4A574" stroke="#C49668" stroke-width="1"/>
  <!-- Front left paw (spread far left) -->
  <rect x="14" y="86" width="10" height="12" rx="5" fill="#D4A574" transform="rotate(-25 19 92)"/>
  <ellipse cx="12" cy="96" rx="7" ry="4" fill="#E8C9A8" transform="rotate(-25 12 96)"/>
  <circle cx="8" cy="95" r="1.3" fill="#E8B4B8"/>
  <circle cx="12" cy="97" r="1.3" fill="#E8B4B8"/>
  <circle cx="15" cy="95" r="1.3" fill="#E8B4B8"/>
  <!-- Front right paw (spread far right) -->
  <rect x="92" y="86" width="10" height="12" rx="5" fill="#B8845A" transform="rotate(25 97 92)"/>
  <ellipse cx="104" cy="96" rx="7" ry="4" fill="#D4A574" transform="rotate(25 104 96)"/>
  <circle cx="100" cy="95" r="1.3" fill="#E8B4B8"/>
  <circle cx="104" cy="97" r="1.3" fill="#E8B4B8"/>
  <circle cx="107" cy="95" r="1.3" fill="#E8B4B8"/>
  <!-- Back left paw (spread) -->
  <ellipse cx="20" cy="100" rx="8" ry="5" fill="#D4A574"/>
  <ellipse cx="20" cy="103" rx="7" ry="3" fill="#E8C9A8"/>
  <circle cx="16" cy="104" r="1.5" fill="#E8B4B8"/>
  <circle cx="20" cy="105" r="1.5" fill="#E8B4B8"/>
  <circle cx="24" cy="104" r="1.5" fill="#E8B4B8"/>
  <!-- Back right paw (spread) -->
  <ellipse cx="100" cy="100" rx="8" ry="5" fill="#B8845A"/>
  <ellipse cx="100" cy="103" rx="7" ry="3" fill="#D4A574"/>
  <circle cx="96" cy="104" r="1.5" fill="#E8B4B8"/>
  <circle cx="100" cy="105" r="1.5" fill="#E8B4B8"/>
  <circle cx="104" cy="104" r="1.5" fill="#E8B4B8"/>
  <!-- Head (centered on stretched body) -->
  <ellipse cx="60" cy="50" rx="26" ry="24" fill="#D4A574"/>
  <!-- Cheek blush (alarmed) -->
  <ellipse cx="40" cy="56" rx="7" ry="4" fill="#E8B4B8" opacity="0.6"/>
  <ellipse cx="80" cy="56" rx="7" ry="4" fill="#E8B4B8" opacity="0.6"/>
  <!-- M-mark -->
  <path d="M48 35 L52 29 L56 35" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M56 35 L60 29 L64 35" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M64 35 L68 29 L72 35" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left ear (back, alarmed) -->
  <path d="M36 38 L28 10 L50 30" fill="#D4A574"/>
  <path d="M38 36 L31 14 L48 30" fill="#E8B4B8"/>
  <!-- Right ear (back, alarmed) -->
  <path d="M84 38 L92 10 L70 30" fill="#D4A574"/>
  <path d="M82 36 L89 14 L72 30" fill="#E8B4B8"/>
  <!-- Left eye (wide, alarmed) -->
  <ellipse cx="48" cy="48" rx="8" ry="9" fill="white"/>
  <ellipse cx="48" cy="49" rx="5" ry="6" fill="#4A3F35"/>
  <circle cx="51" cy="46" r="2" fill="white"/>
  <circle cx="46" cy="52" r="1" fill="white"/>
  <!-- Right eye (wide, alarmed) -->
  <ellipse cx="72" cy="48" rx="8" ry="9" fill="white"/>
  <ellipse cx="72" cy="49" rx="5" ry="6" fill="#4A3F35"/>
  <circle cx="75" cy="46" r="2" fill="white"/>
  <circle cx="70" cy="52" r="1" fill="white"/>
  <!-- Nose -->
  <path d="M58 56 L60 58 L62 56" fill="#D4918A" stroke="#D4918A" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Mouth (open, alarmed) -->
  <path d="M54 62 Q57 67 60 65 Q63 67 66 62" fill="#D4918A" stroke="#4A3F35" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Whiskers left (sticking out wide) -->
  <line x1="42" y1="54" x2="24" y2="50" stroke="#4A3F35" stroke-width="0.8"/>
  <line x1="42" y1="56" x2="24" y2="57" stroke="#4A3F35" stroke-width="0.8"/>
  <line x1="42" y1="58" x2="25" y2="64" stroke="#4A3F35" stroke-width="0.8"/>
  <!-- Whiskers right -->
  <line x1="78" y1="54" x2="96" y2="50" stroke="#4A3F35" stroke-width="0.8"/>
  <line x1="78" y1="56" x2="96" y2="57" stroke="#4A3F35" stroke-width="0.8"/>
  <line x1="78" y1="58" x2="95" y2="64" stroke="#4A3F35" stroke-width="0.8"/>
  <!-- Stress/motion lines -->
  <line x1="6" y1="74" x2="2" y2="72" stroke="#B8845A" stroke-width="1" stroke-linecap="round"/>
  <line x1="6" y1="78" x2="1" y2="78" stroke="#B8845A" stroke-width="1" stroke-linecap="round"/>
  <line x1="6" y1="82" x2="2" y2="84" stroke="#B8845A" stroke-width="1" stroke-linecap="round"/>
  <line x1="114" y1="74" x2="118" y2="72" stroke="#B8845A" stroke-width="1" stroke-linecap="round"/>
  <line x1="114" y1="78" x2="119" y2="78" stroke="#B8845A" stroke-width="1" stroke-linecap="round"/>
  <line x1="114" y1="82" x2="118" y2="84" stroke="#B8845A" stroke-width="1" stroke-linecap="round"/>
  <!-- Sweat drop -->
  <path d="M94 32 Q96 26 98 32 Q96 35 94 32" fill="#B8D4E8" opacity="0.7"/>
</svg>