<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <!-- Tail (wrapped around, slight sway) -->
  <path d="M38 116 Q22 120 18 107 Q15 97 22 98 Q28 99 24 108 Q22 114 35 113" fill="#D4A574" stroke="#C49668" stroke-width="1"/>
  <path d="M19 104 Q21 100 25 102" stroke="#C49668" stroke-width="1.2" fill="none"/>
  <!-- Body (sitting, slight sway to right) -->
  <ellipse cx="62" cy="105" rx="28" ry="22" fill="#D4A574" transform="rotate(3 62 105)"/>
  <!-- Belly -->
  <ellipse cx="64" cy="108" rx="18" ry="16" fill="#F5EDE4"/>
  <!-- Body stripes -->
  <path d="M46 94 Q52 90 58 94" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M42 100 Q50 96 56 100" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M44 106 Q50 103 57 106" stroke="#C49668" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Back legs (folded, sitting - slight offset from sway) -->
  <ellipse cx="40" cy="118" rx="12" ry="7" fill="#D4A574"/>
  <ellipse cx="84" cy="118" rx="12" ry="7" fill="#B8845A"/>
  <!-- Front paws (together) -->
  <ellipse cx="56" cy="122" rx="8" ry="5" fill="#E8C9A8"/>
  <ellipse cx="70" cy="122" rx="8" ry="5" fill="#D4A574"/>
  <circle cx="52" cy="123" r="1.5" fill="#E8B4B8"/>
  <circle cx="56" cy="124" r="1.5" fill="#E8B4B8"/>
  <circle cx="60" cy="123" r="1.5" fill="#E8B4B8"/>
  <circle cx="66" cy="123" r="1.5" fill="#E8B4B8"/>
  <circle cx="70" cy="124" r="1.5" fill="#E8B4B8"/>
  <circle cx="74" cy="123" r="1.5" fill="#E8B4B8"/>
  <!-- Front legs -->
  <rect x="50" y="108" width="10" height="14" rx="5" fill="#D4A574"/>
  <rect x="64" y="108" width="10" height="14" rx="5" fill="#B8845A"/>
  <!-- Head (slightly tilted from sway) -->
  <ellipse cx="62" cy="60" rx="26" ry="24" fill="#D4A574" transform="rotate(3 62 60)"/>
  <!-- Cheek blush -->
  <ellipse cx="42" cy="65" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <ellipse cx="82" cy="65" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <!-- M-mark -->
  <path d="M50 45 L54 39 L58 45" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M58 45 L62 39 L66 45" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M66 45 L70 39 L74 45" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left ear -->
  <path d="M38 49 L31 23 L50 41" fill="#D4A574"/>
  <path d="M40 47 L34 27 L48 41" fill="#E8B4B8"/>
  <!-- Right ear -->
  <path d="M86 49 L92 23 L74 41" fill="#D4A574"/>
  <path d="M84 47 L89 27 L76 41" fill="#E8B4B8"/>
  <!-- Left eye -->
  <ellipse cx="52" cy="59" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="53" cy="60" rx="4" ry="4.5" fill="#4A3F35"/>
  <circle cx="55" cy="58" r="1.5" fill="white"/>
  <circle cx="51" cy="62" r="0.8" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="72" cy="59" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="73" cy="60" rx="4" ry="4.5" fill="#4A3F35"/>
  <circle cx="75" cy="58" r="1.5" fill="white"/>
  <circle cx="71" cy="62" r="0.8" fill="white"/>
  <!-- Nose -->
  <path d="M60 67 L62 69 L64 67" fill="#D4918A" stroke="#D4918A" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Mouth -->
  <path d="M62 69 Q58 73 56 71" stroke="#4A3F35" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M62 69 Q66 73 68 71" stroke="#4A3F35" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="46" y1="65" x2="30" y2="62" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="46" y1="67" x2="30" y2="68" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="46" y1="69" x2="31" y2="74" stroke="#4A3F35" stroke-width="0.7"/>
  <!-- Whiskers right -->
  <line x1="78" y1="65" x2="94" y2="62" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="78" y1="67" x2="94" y2="68" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="78" y1="69" x2="93" y2="74" stroke="#4A3F35" stroke-width="0.7"/>
  <!-- White chest patch -->
  <ellipse cx="62" cy="92" rx="10" ry="8" fill="#F5EDE4"/>
</svg>