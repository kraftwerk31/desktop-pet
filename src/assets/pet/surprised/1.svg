<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <!-- Tail (poofed out, surprised) -->
  <path d="M22 92 Q2 88 4 68 Q6 52 18 56 Q26 58 20 72 Q14 84 28 88" fill="#D4A574" stroke="#C49668" stroke-width="1"/>
  <path d="M6 72 Q8 62 16 64" stroke="#C49668" stroke-width="1.2" fill="none"/>
  <path d="M8 65 Q12 58 18 62" stroke="#C49668" stroke-width="0.8" fill="none"/>
  <!-- Body (slightly jumped up - higher than normal) -->
  <ellipse cx="58" cy="88" rx="28" ry="22" fill="#D4A574"/>
  <!-- Belly -->
  <ellipse cx="60" cy="92" rx="16" ry="16" fill="#F5EDE4"/>
  <!-- Body stripes -->
  <path d="M42 76 Q48 72 54 76" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M38 82 Q46 78 52 82" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Back left leg (splayed out) -->
  <rect x="36" y="98" width="8" height="14" rx="4" fill="#D4A574" transform="rotate(-15 40 105)"/>
  <ellipse cx="38" cy="112" rx="7" ry="3" fill="#E8C9A8"/>
  <circle cx="34" cy="113" r="1.5" fill="#E8B4B8"/>
  <circle cx="38" cy="114" r="1.5" fill="#E8B4B8"/>
  <circle cx="42" cy="113" r="1.5" fill="#E8B4B8"/>
  <!-- Back right leg (splayed out) -->
  <rect x="70" y="98" width="8" height="14" rx="4" fill="#B8845A" transform="rotate(15 74 105)"/>
  <ellipse cx="78" cy="112" rx="7" ry="3" fill="#D4A574"/>
  <circle cx="74" cy="113" r="1.5" fill="#E8B4B8"/>
  <circle cx="78" cy="114" r="1.5" fill="#E8B4B8"/>
  <circle cx="82" cy="113" r="1.5" fill="#E8B4B8"/>
  <!-- Front left leg (splayed) -->
  <rect x="40" y="96" width="8" height="14" rx="4" fill="#D4A574" transform="rotate(-10 44 103)"/>
  <ellipse cx="42" cy="110" rx="6" ry="3" fill="#E8C9A8"/>
  <circle cx="39" cy="111" r="1.3" fill="#E8B4B8"/>
  <circle cx="42" cy="112" r="1.3" fill="#E8B4B8"/>
  <circle cx="45" cy="111" r="1.3" fill="#E8B4B8"/>
  <!-- Front right leg (splayed) -->
  <rect x="66" y="96" width="8" height="14" rx="4" fill="#B8845A" transform="rotate(10 70 103)"/>
  <ellipse cx="74" cy="110" rx="6" ry="3" fill="#D4A574"/>
  <circle cx="71" cy="111" r="1.3" fill="#E8B4B8"/>
  <circle cx="74" cy="112" r="1.3" fill="#E8B4B8"/>
  <circle cx="77" cy="111" r="1.3" fill="#E8B4B8"/>
  <!-- Head -->
  <ellipse cx="60" cy="42" rx="26" ry="24" fill="#D4A574"/>
  <!-- Cheek blush -->
  <ellipse cx="40" cy="48" rx="7" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <ellipse cx="80" cy="48" rx="7" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <!-- M-mark -->
  <path d="M48 27 L52 21 L56 27" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M56 27 L60 21 L64 27" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M64 27 L68 21 L72 27" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left ear (STRAIGHT UP - very tall) -->
  <path d="M36 30 L26 -2 L52 22" fill="#D4A574"/>
  <path d="M38 28 L29 2 L50 22" fill="#E8B4B8"/>
  <!-- Right ear (STRAIGHT UP - very tall) -->
  <path d="M84 30 L94 -2 L68 22" fill="#D4A574"/>
  <path d="M82 28 L91 2 L70 22" fill="#E8B4B8"/>
  <!-- Left eye (VERY WIDE) -->
  <ellipse cx="48" cy="42" rx="9" ry="10" fill="white"/>
  <ellipse cx="49" cy="43" rx="6" ry="7" fill="#4A3F35"/>
  <circle cx="52" cy="40" r="2.5" fill="white"/>
  <circle cx="47" cy="46" r="1.2" fill="white"/>
  <!-- Right eye (VERY WIDE) -->
  <ellipse cx="72" cy="42" rx="9" ry="10" fill="white"/>
  <ellipse cx="73" cy="43" rx="6" ry="7" fill="#4A3F35"/>
  <circle cx="76" cy="40" r="2.5" fill="white"/>
  <circle cx="71" cy="46" r="1.2" fill="white"/>
  <!-- Nose -->
  <path d="M58 51 L60 53 L62 51" fill="#D4918A" stroke="#D4918A" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Mouth (wide open O - surprised) -->
  <ellipse cx="60" cy="58" rx="5" ry="5" fill="#D4918A" stroke="#4A3F35" stroke-width="1"/>
  <!-- Inner mouth -->
  <ellipse cx="60" cy="59" rx="3.5" ry="3.5" fill="#4A3F35"/>
  <!-- Whiskers left (sticking out more) -->
  <line x1="40" y1="48" x2="22" y2="44" stroke="#4A3F35" stroke-width="0.8"/>
  <line x1="40" y1="50" x2="22" y2="51" stroke="#4A3F35" stroke-width="0.8"/>
  <line x1="40" y1="52" x2="23" y2="58" stroke="#4A3F35" stroke-width="0.8"/>
  <!-- Whiskers right -->
  <line x1="80" y1="48" x2="98" y2="44" stroke="#4A3F35" stroke-width="0.8"/>
  <line x1="80" y1="50" x2="98" y2="51" stroke="#4A3F35" stroke-width="0.8"/>
  <line x1="80" y1="52" x2="97" y2="58" stroke="#4A3F35" stroke-width="0.8"/>
  <!-- Surprise lines -->
  <line x1="36" y1="30" x2="32" y2="24" stroke="#B8845A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="28" x2="38" y2="22" stroke="#B8845A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="84" y1="30" x2="88" y2="24" stroke="#B8845A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="28" x2="82" y2="22" stroke="#B8845A" stroke-width="1.5" stroke-linecap="round"/>
</svg>