<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <!-- Tail -->
  <path d="M28 102 Q10 92 12 72 Q14 57 24 62 Q30 65 26 77 Q22 89 32 97" fill="#D4A574" stroke="#C49668" stroke-width="1"/>
  <path d="M14 75 Q16 67 22 69" stroke="#C49668" stroke-width="1.2" fill="none"/>
  <!-- Body (passing through, neutral height) -->
  <ellipse cx="62" cy="91" rx="28" ry="22" fill="#D4A574" transform="rotate(-5 62 91)"/>
  <!-- Belly -->
  <ellipse cx="64" cy="95" rx="16" ry="16" fill="#F5EDE4" transform="rotate(-5 64 95)"/>
  <!-- Body stripes -->
  <path d="M46 78 Q52 74 58 78" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M42 84 Q50 80 56 84" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M44 90 Q50 87 57 90" stroke="#C49668" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Back left leg (tucked under) -->
  <ellipse cx="42" cy="110" rx="7" ry="5.5" fill="#D4A574"/>
  <ellipse cx="42" cy="114" rx="6" ry="3" fill="#E8C9A8"/>
  <circle cx="39" cy="115" r="1.3" fill="#E8B4B8"/>
  <circle cx="42" cy="116" r="1.3" fill="#E8B4B8"/>
  <circle cx="45" cy="115" r="1.3" fill="#E8B4B8"/>
  <!-- Back right leg (forward step) -->
  <rect x="70" y="100" width="8" height="16" rx="4" fill="#B8845A" transform="rotate(-10 74 108)"/>
  <ellipse cx="72" cy="116" rx="6" ry="3" fill="#D4A574"/>
  <circle cx="69" cy="117" r="1.3" fill="#E8B4B8"/>
  <circle cx="72" cy="118" r="1.3" fill="#E8B4B8"/>
  <circle cx="75" cy="117" r="1.3" fill="#E8B4B8"/>
  <!-- Front left leg (extended forward) -->
  <rect x="46" y="96" width="8" height="16" rx="4" fill="#D4A574" transform="rotate(15 50 104)"/>
  <ellipse cx="48" cy="112" rx="6" ry="3" fill="#E8C9A8"/>
  <circle cx="45" cy="113" r="1.3" fill="#E8B4B8"/>
  <circle cx="48" cy="114" r="1.3" fill="#E8B4B8"/>
  <circle cx="51" cy="113" r="1.3" fill="#E8B4B8"/>
  <!-- Front right leg (tucked) -->
  <rect x="64" y="100" width="8" height="14" rx="4" fill="#B8845A"/>
  <ellipse cx="68" cy="114" rx="6" ry="3" fill="#D4A574"/>
  <circle cx="65" cy="115" r="1.3" fill="#E8B4B8"/>
  <circle cx="68" cy="116" r="1.3" fill="#E8B4B8"/>
  <circle cx="71" cy="115" r="1.3" fill="#E8B4B8"/>
  <!-- Head -->
  <ellipse cx="64" cy="50" rx="26" ry="24" fill="#D4A574"/>
  <!-- Cheek blush -->
  <ellipse cx="44" cy="55" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <ellipse cx="84" cy="55" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <!-- M-mark -->
  <path d="M52 35 L56 29 L60 35" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M60 35 L64 29 L68 35" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M68 35 L72 29 L76 35" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left ear -->
  <path d="M40 39 L33 13 L52 31" fill="#D4A574"/>
  <path d="M42 37 L36 17 L50 31" fill="#E8B4B8"/>
  <!-- Right ear -->
  <path d="M88 39 L95 13 L76 31" fill="#D4A574"/>
  <path d="M86 37 L92 17 L78 31" fill="#E8B4B8"/>
  <!-- Left eye -->
  <ellipse cx="54" cy="49" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="55" cy="50" rx="4" ry="4.5" fill="#4A3F35"/>
  <circle cx="57" cy="48" r="1.5" fill="white"/>
  <circle cx="53" cy="52" r="0.8" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="74" cy="49" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="75" cy="50" rx="4" ry="4.5" fill="#4A3F35"/>
  <circle cx="77" cy="48" r="1.5" fill="white"/>
  <circle cx="73" cy="52" r="0.8" fill="white"/>
  <!-- Nose -->
  <path d="M62 57 L64 59 L66 57" fill="#D4918A" stroke="#D4918A" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Mouth -->
  <path d="M64 59 Q60 63 58 61" stroke="#4A3F35" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M64 59 Q68 63 70 61" stroke="#4A3F35" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="48" y1="55" x2="32" y2="52" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="48" y1="57" x2="32" y2="58" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="48" y1="59" x2="33" y2="64" stroke="#4A3F35" stroke-width="0.7"/>
  <!-- Whiskers right -->
  <line x1="80" y1="55" x2="96" y2="52" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="80" y1="57" x2="96" y2="58" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="80" y1="59" x2="95" y2="64" stroke="#4A3F35" stroke-width="0.7"/>
</svg>