<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <!-- Tail -->
  <path d="M30 100 Q14 90 16 70 Q18 55 28 60 Q34 63 28 75 Q24 87 34 95" fill="#D4A574" stroke="#C49668" stroke-width="1"/>
  <path d="M18 73 Q20 65 26 67" stroke="#C49668" stroke-width="1.2" fill="none"/>
  <!-- Body (slight lean forward) -->
  <ellipse cx="62" cy="93" rx="28" ry="22" fill="#D4A574" transform="rotate(-5 62 93)"/>
  <!-- Belly -->
  <ellipse cx="64" cy="97" rx="16" ry="16" fill="#F5EDE4" transform="rotate(-5 64 97)"/>
  <!-- Body stripes -->
  <path d="M46 80 Q52 76 58 80" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M42 86 Q50 82 56 86" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M44 92 Q50 89 57 92" stroke="#C49668" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Back left leg (extended back) -->
  <rect x="38" y="104" width="8" height="16" rx="4" fill="#D4A574" transform="rotate(-15 42 112)"/>
  <ellipse cx="40" cy="120" rx="6" ry="3" fill="#E8C9A8"/>
  <circle cx="37" cy="121" r="1.3" fill="#E8B4B8"/>
  <circle cx="40" cy="122" r="1.3" fill="#E8B4B8"/>
  <circle cx="43" cy="121" r="1.3" fill="#E8B4B8"/>
  <!-- Back right leg (tucked) -->
  <ellipse cx="74" cy="112" rx="7" ry="6" fill="#B8845A"/>
  <ellipse cx="74" cy="116" rx="6" ry="3" fill="#D4A574"/>
  <circle cx="71" cy="117" r="1.3" fill="#E8B4B8"/>
  <circle cx="74" cy="118" r="1.3" fill="#E8B4B8"/>
  <circle cx="77" cy="117" r="1.3" fill="#E8B4B8"/>
  <!-- Front left leg (forward) -->
  <rect x="46" y="100" width="8" height="16" rx="4" fill="#D4A574" transform="rotate(10 50 108)"/>
  <ellipse cx="50" cy="116" rx="6" ry="3" fill="#E8C9A8"/>
  <circle cx="47" cy="117" r="1.3" fill="#E8B4B8"/>
  <circle cx="50" cy="118" r="1.3" fill="#E8B4B8"/>
  <circle cx="53" cy="117" r="1.3" fill="#E8B4B8"/>
  <!-- Front right leg (back) -->
  <rect x="64" y="102" width="8" height="14" rx="4" fill="#B8845A"/>
  <ellipse cx="68" cy="116" rx="6" ry="3" fill="#D4A574"/>
  <circle cx="65" cy="117" r="1.3" fill="#E8B4B8"/>
  <circle cx="68" cy="118" r="1.3" fill="#E8B4B8"/>
  <circle cx="71" cy="117" r="1.3" fill="#E8B4B8"/>
  <!-- Head -->
  <ellipse cx="64" cy="52" rx="26" ry="24" fill="#D4A574"/>
  <!-- Cheek blush -->
  <ellipse cx="44" cy="57" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <ellipse cx="84" cy="57" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <!-- M-mark -->
  <path d="M52 37 L56 31 L60 37" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M60 37 L64 31 L68 37" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M68 37 L72 31 L76 37" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left ear -->
  <path d="M40 41 L33 15 L52 33" fill="#D4A574"/>
  <path d="M42 39 L36 19 L50 33" fill="#E8B4B8"/>
  <!-- Right ear -->
  <path d="M88 41 L95 15 L76 33" fill="#D4A574"/>
  <path d="M86 39 L92 19 L78 33" fill="#E8B4B8"/>
  <!-- Left eye -->
  <ellipse cx="54" cy="51" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="55" cy="52" rx="4" ry="4.5" fill="#4A3F35"/>
  <circle cx="57" cy="50" r="1.5" fill="white"/>
  <circle cx="53" cy="54" r="0.8" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="74" cy="51" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="75" cy="52" rx="4" ry="4.5" fill="#4A3F35"/>
  <circle cx="77" cy="50" r="1.5" fill="white"/>
  <circle cx="73" cy="54" r="0.8" fill="white"/>
  <!-- Nose -->
  <path d="M62 59 L64 61 L66 59" fill="#D4918A" stroke="#D4918A" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Mouth -->
  <path d="M64 61 Q60 65 58 63" stroke="#4A3F35" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M64 61 Q68 65 70 63" stroke="#4A3F35" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="48" y1="57" x2="32" y2="54" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="48" y1="59" x2="32" y2="60" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="48" y1="61" x2="33" y2="66" stroke="#4A3F35" stroke-width="0.7"/>
  <!-- Whiskers right -->
  <line x1="80" y1="57" x2="96" y2="54" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="80" y1="59" x2="96" y2="60" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="80" y1="61" x2="95" y2="66" stroke="#4A3F35" stroke-width="0.7"/>
</svg>