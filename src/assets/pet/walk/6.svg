<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <!-- Tail -->
  <path d="M28 102 Q10 92 12 72 Q14 57 24 62 Q30 65 26 77 Q22 89 32 97" fill="#D4A574" stroke="#C49668" stroke-width="1"/>
  <path d="M14 75 Q16 67 22 69" stroke="#C49668" stroke-width="1.2" fill="none"/>
  <!-- Body (high point of bob) -->
  <ellipse cx="62" cy="89" rx="28" ry="21" fill="#D4A574" transform="rotate(-5 62 89)"/>
  <!-- Belly -->
  <ellipse cx="64" cy="93" rx="16" ry="15" fill="#F5EDE4" transform="rotate(-5 64 93)"/>
  <!-- Body stripes -->
  <path d="M46 76 Q52 72 58 76" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M42 82 Q50 78 56 82" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M44 88 Q50 85 57 88" stroke="#C49668" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Back left leg (tucked forward) -->
  <ellipse cx="44" cy="108" rx="7" ry="5.5" fill="#D4A574"/>
  <ellipse cx="44" cy="112" rx="6" ry="3" fill="#E8C9A8"/>
  <circle cx="41" cy="113" r="1.3" fill="#E8B4B8"/>
  <circle cx="44" cy="114" r="1.3" fill="#E8B4B8"/>
  <circle cx="47" cy="113" r="1.3" fill="#E8B4B8"/>
  <!-- Back right leg (extended back) -->
  <rect x="72" y="100" width="8" height="16" rx="4" fill="#B8845A" transform="rotate(15 76 108)"/>
  <ellipse cx="78" cy="116" rx="6" ry="3" fill="#D4A574"/>
  <circle cx="75" cy="117" r="1.3" fill="#E8B4B8"/>
  <circle cx="78" cy="118" r="1.3" fill="#E8B4B8"/>
  <circle cx="81" cy="117" r="1.3" fill="#E8B4B8"/>
  <!-- Front left leg (back) -->
  <rect x="48" y="98" width="8" height="14" rx="4" fill="#D4A574" transform="rotate(-8 52 105)"/>
  <ellipse cx="50" cy="112" rx="6" ry="3" fill="#E8C9A8"/>
  <circle cx="47" cy="113" r="1.3" fill="#E8B4B8"/>
  <circle cx="50" cy="114" r="1.3" fill="#E8B4B8"/>
  <circle cx="53" cy="113" r="1.3" fill="#E8B4B8"/>
  <!-- Front right leg (forward) -->
  <rect x="66" y="96" width="8" height="16" rx="4" fill="#B8845A" transform="rotate(10 70 104)"/>
  <ellipse cx="72" cy="112" rx="6" ry="3" fill="#D4A574"/>
  <circle cx="69" cy="113" r="1.3" fill="#E8B4B8"/>
  <circle cx="72" cy="114" r="1.3" fill="#E8B4B8"/>
  <circle cx="75" cy="113" r="1.3" fill="#E8B4B8"/>
  <!-- Head -->
  <ellipse cx="64" cy="48" rx="26" ry="24" fill="#D4A574"/>
  <!-- Cheek blush -->
  <ellipse cx="44" cy="53" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <ellipse cx="84" cy="53" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <!-- M-mark -->
  <path d="M52 33 L56 27 L60 33" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M60 33 L64 27 L68 33" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M68 33 L72 27 L76 33" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left ear -->
  <path d="M40 37 L33 11 L52 29" fill="#D4A574"/>
  <path d="M42 35 L36 15 L50 29" fill="#E8B4B8"/>
  <!-- Right ear -->
  <path d="M88 37 L95 11 L76 29" fill="#D4A574"/>
  <path d="M86 35 L92 15 L78 29" fill="#E8B4B8"/>
  <!-- Left eye -->
  <ellipse cx="54" cy="47" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="55" cy="48" rx="4" ry="4.5" fill="#4A3F35"/>
  <circle cx="57" cy="46" r="1.5" fill="white"/>
  <circle cx="53" cy="50" r="0.8" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="74" cy="47" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="75" cy="48" rx="4" ry="4.5" fill="#4A3F35"/>
  <circle cx="77" cy="46" r="1.5" fill="white"/>
  <circle cx="73" cy="50" r="0.8" fill="white"/>
  <!-- Nose -->
  <path d="M62 55 L64 57 L66 55" fill="#D4918A" stroke="#D4918A" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Mouth -->
  <path d="M64 57 Q60 61 58 59" stroke="#4A3F35" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M64 57 Q68 61 70 59" stroke="#4A3F35" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="48" y1="53" x2="32" y2="50" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="48" y1="55" x2="32" y2="56" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="48" y1="57" x2="33" y2="62" stroke="#4A3F35" stroke-width="0.7"/>
  <!-- Whiskers right -->
  <line x1="80" y1="53" x2="96" y2="50" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="80" y1="55" x2="96" y2="56" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="80" y1="57" x2="95" y2="62" stroke="#4A3F35" stroke-width="0.7"/>
</svg>