<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <!-- Tail -->
  <path d="M30 98 Q12 88 14 68 Q16 53 26 58 Q32 61 26 73 Q22 85 34 93" fill="#D4A574" stroke="#C49668" stroke-width="1"/>
  <path d="M16 71 Q18 63 24 65" stroke="#C49668" stroke-width="1.2" fill="none"/>
  <!-- Body (bobbing down) -->
  <ellipse cx="62" cy="96" rx="28" ry="23" fill="#D4A574" transform="rotate(-5 62 96)"/>
  <!-- Belly -->
  <ellipse cx="64" cy="100" rx="16" ry="17" fill="#F5EDE4" transform="rotate(-5 64 100)"/>
  <!-- Body stripes -->
  <path d="M46 83 Q52 79 58 83" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M42 89 Q50 85 56 89" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M44 95 Q50 92 57 95" stroke="#C49668" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Back left leg (extended back) -->
  <rect x="38" y="104" width="8" height="16" rx="4" fill="#D4A574" transform="rotate(-15 42 112)"/>
  <ellipse cx="40" cy="120" rx="6" ry="3" fill="#E8C9A8"/>
  <circle cx="37" cy="121" r="1.3" fill="#E8B4B8"/>
  <circle cx="40" cy="122" r="1.3" fill="#E8B4B8"/>
  <circle cx="43" cy="121" r="1.3" fill="#E8B4B8"/>
  <!-- Back right leg (forward) -->
  <rect x="72" y="100" width="8" height="16" rx="4" fill="#B8845A" transform="rotate(10 76 108)"/>
  <ellipse cx="78" cy="116" rx="6" ry="3" fill="#D4A574"/>
  <circle cx="75" cy="117" r="1.3" fill="#E8B4B8"/>
  <circle cx="78" cy="118" r="1.3" fill="#E8B4B8"/>
  <circle cx="81" cy="117" r="1.3" fill="#E8B4B8"/>
  <!-- Front left leg (tucked) -->
  <rect x="48" y="102" width="8" height="14" rx="4" fill="#D4A574"/>
  <ellipse cx="52" cy="116" rx="6" ry="3" fill="#E8C9A8"/>
  <circle cx="49" cy="117" r="1.3" fill="#E8B4B8"/>
  <circle cx="52" cy="118" r="1.3" fill="#E8B4B8"/>
  <circle cx="55" cy="117" r="1.3" fill="#E8B4B8"/>
  <!-- Front right leg (forward) -->
  <rect x="64" y="100" width="8" height="16" rx="4" fill="#B8845A" transform="rotate(-12 68 108)"/>
  <ellipse cx="66" cy="116" rx="6" ry="3" fill="#D4A574"/>
  <circle cx="63" cy="117" r="1.3" fill="#E8B4B8"/>
  <circle cx="66" cy="118" r="1.3" fill="#E8B4B8"/>
  <circle cx="69" cy="117" r="1.3" fill="#E8B4B8"/>
  <!-- Head -->
  <ellipse cx="64" cy="55" rx="26" ry="24" fill="#D4A574"/>
  <!-- Cheek blush -->
  <ellipse cx="44" cy="60" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <ellipse cx="84" cy="60" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <!-- M-mark -->
  <path d="M52 40 L56 34 L60 40" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M60 40 L64 34 L68 40" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M68 40 L72 34 L76 40" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left ear -->
  <path d="M40 44 L33 18 L52 36" fill="#D4A574"/>
  <path d="M42 42 L36 22 L50 36" fill="#E8B4B8"/>
  <!-- Right ear -->
  <path d="M88 44 L95 18 L76 36" fill="#D4A574"/>
  <path d="M86 42 L92 22 L78 36" fill="#E8B4B8"/>
  <!-- Left eye -->
  <ellipse cx="54" cy="54" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="55" cy="55" rx="4" ry="4.5" fill="#4A3F35"/>
  <circle cx="57" cy="53" r="1.5" fill="white"/>
  <circle cx="53" cy="57" r="0.8" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="74" cy="54" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="75" cy="55" rx="4" ry="4.5" fill="#4A3F35"/>
  <circle cx="77" cy="53" r="1.5" fill="white"/>
  <circle cx="73" cy="57" r="0.8" fill="white"/>
  <!-- Nose -->
  <path d="M62 62 L64 64 L66 62" fill="#D4918A" stroke="#D4918A" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Mouth -->
  <path d="M64 64 Q60 68 58 66" stroke="#4A3F35" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M64 64 Q68 68 70 66" stroke="#4A3F35" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="48" y1="60" x2="32" y2="57" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="48" y1="62" x2="32" y2="63" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="48" y1="64" x2="33" y2="69" stroke="#4A3F35" stroke-width="0.7"/>
  <!-- Whiskers right -->
  <line x1="80" y1="60" x2="96" y2="57" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="80" y1="62" x2="96" y2="63" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="80" y1="64" x2="95" y2="69" stroke="#4A3F35" stroke-width="0.7"/>
</svg>