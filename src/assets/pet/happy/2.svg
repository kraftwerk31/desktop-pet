<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <!-- Tail (straight up, very excited) -->
  <path d="M32 82 Q18 68 22 46 Q24 34 32 38 Q38 40 34 52 Q28 66 36 78" fill="#D4A574" stroke="#C49668" stroke-width="1"/>
  <path d="M24 50 Q26 42 32 44" stroke="#C49668" stroke-width="1.2" fill="none"/>
  <!-- Body (bouncing up - higher position) -->
  <ellipse cx="58" cy="85" rx="27" ry="21" fill="#D4A574"/>
  <!-- Belly -->
  <ellipse cx="60" cy="89" rx="16" ry="15" fill="#F5EDE4"/>
  <!-- Body stripes -->
  <path d="M42 73 Q48 69 54 73" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M38 79 Q46 75 52 79" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Back legs (extended from bounce) -->
  <rect x="36" y="96" width="8" height="18" rx="4" fill="#D4A574" transform="rotate(-8 40 105)"/>
  <ellipse cx="40" cy="114" rx="7" ry="3" fill="#E8C9A8"/>
  <circle cx="36" cy="115" r="1.5" fill="#E8B4B8"/>
  <circle cx="40" cy="116" r="1.5" fill="#E8B4B8"/>
  <circle cx="44" cy="115" r="1.5" fill="#E8B4B8"/>
  <rect x="70" y="96" width="8" height="18" rx="4" fill="#B8845A" transform="rotate(8 74 105)"/>
  <ellipse cx="74" cy="114" rx="7" ry="3" fill="#D4A574"/>
  <circle cx="70" cy="115" r="1.5" fill="#E8B4B8"/>
  <circle cx="74" cy="116" r="1.5" fill="#E8B4B8"/>
  <circle cx="78" cy="115" r="1.5" fill="#E8B4B8"/>
  <!-- Front left paw (way up!) -->
  <rect x="38" y="68" width="8" height="14" rx="4" fill="#D4A574" transform="rotate(-35 42 75)"/>
  <ellipse cx="34" cy="68" rx="6" ry="4" fill="#E8C9A8" transform="rotate(-35 34 68)"/>
  <circle cx="31" cy="67" r="1.3" fill="#E8B4B8"/>
  <circle cx="34" cy="66" r="1.3" fill="#E8B4B8"/>
  <circle cx="37" cy="67" r="1.3" fill="#E8B4B8"/>
  <!-- Front right paw (way up!) -->
  <rect x="70" y="68" width="8" height="14" rx="4" fill="#B8845A" transform="rotate(35 74 75)"/>
  <ellipse cx="80" cy="68" rx="6" ry="4" fill="#D4A574" transform="rotate(35 80 68)"/>
  <circle cx="77" cy="67" r="1.3" fill="#E8B4B8"/>
  <circle cx="80" cy="66" r="1.3" fill="#E8B4B8"/>
  <circle cx="83" cy="67" r="1.3" fill="#E8B4B8"/>
  <!-- Head (higher from bounce) -->
  <ellipse cx="60" cy="40" rx="26" ry="24" fill="#D4A574"/>
  <!-- Cheek blush (even bigger) -->
  <ellipse cx="40" cy="46" rx="9" ry="5" fill="#E8B4B8" opacity="0.7"/>
  <ellipse cx="80" cy="46" rx="9" ry="5" fill="#E8B4B8" opacity="0.7"/>
  <!-- M-mark -->
  <path d="M48 25 L52 19 L56 25" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M56 25 L60 19 L64 25" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M64 25 L68 19 L72 25" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left ear (way up) -->
  <path d="M36 29 L28 1 L49 21" fill="#D4A574"/>
  <path d="M38 27 L31 5 L47 21" fill="#E8B4B8"/>
  <!-- Right ear (way up) -->
  <path d="M84 29 L92 1 L71 21" fill="#D4A574"/>
  <path d="M82 27 L89 5 L73 21" fill="#E8B4B8"/>
  <!-- ^^ happy eyes (bigger) -->
  <path d="M40 38 Q46 30 52 38" stroke="#4A3F35" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M68 38 Q74 30 80 38" stroke="#4A3F35" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M58 45 L60 47 L62 45" fill="#D4918A" stroke="#D4918A" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Big open happy mouth -->
  <path d="M50 49 Q55 58 60 54 Q65 58 70 49" fill="#D4918A" stroke="#4A3F35" stroke-width="1" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="60" cy="54" rx="4" ry="3" fill="#E8B4B8"/>
  <!-- Whiskers left -->
  <line x1="44" y1="45" x2="28" y2="42" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="44" y1="47" x2="28" y2="48" stroke="#4A3F35" stroke-width="0.7"/>
  <!-- Whiskers right -->
  <line x1="76" y1="45" x2="92" y2="42" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="76" y1="47" x2="92" y2="48" stroke="#4A3F35" stroke-width="0.7"/>
  <!-- Stars / sparkles -->
  <path d="M14 18 L16 14 L18 18 L22 20 L18 22 L16 26 L14 22 L10 20 Z" fill="#F5EDE4" opacity="0.8"/>
  <path d="M98 16 L99 14 L100 16 L102 17 L100 18 L99 20 L98 18 L96 17 Z" fill="#F5EDE4" opacity="0.6"/>
  <circle cx="106" cy="30" r="2" fill="#F5EDE4" opacity="0.5"/>
  <circle cx="8" cy="36" r="1.5" fill="#F5EDE4" opacity="0.4"/>
</svg>