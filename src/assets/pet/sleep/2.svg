<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <!-- Tail tightly wrapped -->
  <path d="M42 122 Q58 132 68 127 Q82 120 87 110 Q90 102 84 100 Q78 98 80 106 Q82 114 72 120 Q62 126 48 120" fill="#D4A574" stroke="#C49668" stroke-width="1"/>
  <path d="M86 106 Q84 102 80 104" stroke="#C49668" stroke-width="1.2" fill="none"/>
  <!-- Body (more curled, rounder) -->
  <ellipse cx="56" cy="98" rx="30" ry="24" fill="#D4A574"/>
  <!-- Belly -->
  <ellipse cx="53" cy="102" rx="18" ry="16" fill="#F5EDE4"/>
  <!-- Body stripes -->
  <path d="M36 88 Q44 84 52 88" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M34 94 Q42 90 50 94" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M36 100 Q43 97 50 100" stroke="#C49668" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Front paws tucked tighter -->
  <ellipse cx="46" cy="114" rx="7" ry="4.5" fill="#E8C9A8"/>
  <ellipse cx="58" cy="116" rx="6" ry="4.5" fill="#D4A574"/>
  <circle cx="43" cy="115" r="1.3" fill="#E8B4B8"/>
  <circle cx="46" cy="116" r="1.3" fill="#E8B4B8"/>
  <circle cx="49" cy="115" r="1.3" fill="#E8B4B8"/>
  <circle cx="55" cy="117" r="1.3" fill="#E8B4B8"/>
  <circle cx="58" cy="118" r="1.3" fill="#E8B4B8"/>
  <circle cx="61" cy="117" r="1.3" fill="#E8B4B8"/>
  <!-- Head (lower, more tucked) -->
  <ellipse cx="50" cy="66" rx="22" ry="20" fill="#D4A574"/>
  <!-- M-mark -->
  <path d="M40 52 L44 46 L48 52" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M48 52 L52 46 L56 52" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M56 52 L60 46 L64 52" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left ear (droopy/relaxed) -->
  <path d="M32 60 L24 38 L42 52" fill="#D4A574"/>
  <path d="M34 58 L27 42 L40 52" fill="#E8B4B8"/>
  <!-- Right ear (droopy) -->
  <path d="M68 60 L76 38 L58 52" fill="#D4A574"/>
  <path d="M66 58 L73 42 L60 52" fill="#E8B4B8"/>
  <!-- Closed eyes (gentle curves, deeper sleep) -->
  <path d="M38 64 Q43 59 48 64" stroke="#4A3F35" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M54 64 Q59 59 64 64" stroke="#4A3F35" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M48 70 L50 72 L52 70" fill="#D4918A" stroke="#D4918A" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Mouth (very peaceful) -->
  <path d="M50 72 Q48 74 47 73" stroke="#4A3F35" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="36" y1="69" x2="22" y2="67" stroke="#4A3F35" stroke-width="0.6"/>
  <line x1="36" y1="71" x2="22" y2="72" stroke="#4A3F35" stroke-width="0.6"/>
  <!-- Whiskers right -->
  <line x1="64" y1="69" x2="78" y2="67" stroke="#4A3F35" stroke-width="0.6"/>
  <line x1="64" y1="71" x2="78" y2="72" stroke="#4A3F35" stroke-width="0.6"/>
  <!-- Cheek blush -->
  <ellipse cx="36" cy="69" rx="5" ry="3" fill="#E8B4B8" opacity="0.6"/>
  <ellipse cx="66" cy="69" rx="5" ry="3" fill="#E8B4B8" opacity="0.6"/>
  <!-- Zzz (bigger, more asleep) -->
  <text x="76" y="48" font-family="sans-serif" font-size="12" fill="#B8845A" opacity="0.6">z</text>
  <text x="84" y="36" font-family="sans-serif" font-size="9" fill="#B8845A" opacity="0.45">z</text>
  <text x="90" y="27" font-family="sans-serif" font-size="7" fill="#B8845A" opacity="0.3">z</text>
</svg>