<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <!-- Tail wrapped around body -->
  <path d="M40 120 Q55 130 65 125 Q80 118 85 108 Q88 100 82 98 Q76 96 78 104 Q80 112 70 118 Q60 124 45 118" fill="#D4A574" stroke="#C49668" stroke-width="1"/>
  <path d="M84 104 Q82 100 78 102" stroke="#C49668" stroke-width="1.2" fill="none"/>
  <!-- Body (curled up, round) -->
  <ellipse cx="58" cy="95" rx="32" ry="26" fill="#D4A574"/>
  <!-- Belly (visible curled part) -->
  <ellipse cx="55" cy="100" rx="20" ry="18" fill="#F5EDE4"/>
  <!-- Body stripes -->
  <path d="M38 84 Q46 80 54 84" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M36 90 Q44 86 52 90" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M38 96 Q45 93 52 96" stroke="#C49668" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Front paws tucked -->
  <ellipse cx="48" cy="112" rx="8" ry="5" fill="#E8C9A8"/>
  <ellipse cx="60" cy="114" rx="7" ry="5" fill="#D4A574"/>
  <circle cx="45" cy="113" r="1.3" fill="#E8B4B8"/>
  <circle cx="48" cy="114" r="1.3" fill="#E8B4B8"/>
  <circle cx="51" cy="113" r="1.3" fill="#E8B4B8"/>
  <circle cx="57" cy="115" r="1.3" fill="#E8B4B8"/>
  <circle cx="60" cy="116" r="1.3" fill="#E8B4B8"/>
  <circle cx="63" cy="115" r="1.3" fill="#E8B4B8"/>
  <!-- Head (resting, tilted down slightly) -->
  <ellipse cx="52" cy="62" rx="24" ry="22" fill="#D4A574"/>
  <!-- M-mark -->
  <path d="M42 48 L46 42 L50 48" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M50 48 L54 42 L58 48" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M58 48 L62 42 L66 48" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left ear (relaxed, slightly droopy) -->
  <path d="M32 56 L26 32 L44 48" fill="#D4A574"/>
  <path d="M34 54 L29 36 L42 48" fill="#E8B4B8"/>
  <!-- Right ear (relaxed) -->
  <path d="M72 56 L78 32 L60 48" fill="#D4A574"/>
  <path d="M70 54 L75 36 L62 48" fill="#E8B4B8"/>
  <!-- Closed eyes (curved lines) -->
  <path d="M40 60 Q45 55 50 60" stroke="#4A3F35" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M56 60 Q61 55 66 60" stroke="#4A3F35" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M50 67 L52 69 L54 67" fill="#D4918A" stroke="#D4918A" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Mouth (small, peaceful) -->
  <path d="M52 69 Q50 71 49 70" stroke="#4A3F35" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="38" y1="66" x2="24" y2="64" stroke="#4A3F35" stroke-width="0.6"/>
  <line x1="38" y1="68" x2="24" y2="69" stroke="#4A3F35" stroke-width="0.6"/>
  <!-- Whiskers right -->
  <line x1="66" y1="66" x2="80" y2="64" stroke="#4A3F35" stroke-width="0.6"/>
  <line x1="66" y1="68" x2="80" y2="69" stroke="#4A3F35" stroke-width="0.6"/>
  <!-- Cheek blush (sleeping) -->
  <ellipse cx="38" cy="66" rx="5" ry="3" fill="#E8B4B8" opacity="0.5"/>
  <ellipse cx="68" cy="66" rx="5" ry="3" fill="#E8B4B8" opacity="0.5"/>
  <!-- Zzz indicator -->
  <text x="78" y="45" font-family="sans-serif" font-size="10" fill="#B8845A" opacity="0.6">z</text>
  <text x="86" y="35" font-family="sans-serif" font-size="8" fill="#B8845A" opacity="0.4">z</text>
  <text x="92" y="27" font-family="sans-serif" font-size="6" fill="#B8845A" opacity="0.3">z</text>
</svg>