<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <!-- Tail (up, alert) -->
  <path d="M28 95 Q12 82 14 60 Q16 48 26 52 Q32 55 26 67 Q20 80 32 90" fill="#D4A574" stroke="#C49668" stroke-width="1"/>
  <path d="M16 63 Q18 55 24 57" stroke="#C49668" stroke-width="1.2" fill="none"/>
  <!-- Body (alert, upright) -->
  <ellipse cx="58" cy="95" rx="26" ry="22" fill="#D4A574"/>
  <!-- Belly -->
  <ellipse cx="60" cy="98" rx="15" ry="16" fill="#F5EDE4"/>
  <!-- Body stripes -->
  <path d="M42 83 Q48 79 54 83" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M38 89 Q46 85 52 89" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Back left leg -->
  <ellipse cx="42" cy="115" rx="8" ry="6" fill="#D4A574"/>
  <ellipse cx="42" cy="118" rx="7" ry="3" fill="#E8C9A8"/>
  <circle cx="38" cy="119" r="1.5" fill="#E8B4B8"/>
  <circle cx="42" cy="120" r="1.5" fill="#E8B4B8"/>
  <circle cx="46" cy="119" r="1.5" fill="#E8B4B8"/>
  <!-- Back right leg -->
  <ellipse cx="72" cy="115" rx="8" ry="6" fill="#B8845A"/>
  <ellipse cx="72" cy="118" rx="7" ry="3" fill="#D4A574"/>
  <circle cx="68" cy="119" r="1.5" fill="#E8B4B8"/>
  <circle cx="72" cy="120" r="1.5" fill="#E8B4B8"/>
  <circle cx="76" cy="119" r="1.5" fill="#E8B4B8"/>
  <!-- Front right leg (standing) -->
  <rect x="64" y="104" width="8" height="14" rx="4" fill="#B8845A"/>
  <ellipse cx="68" cy="118" rx="6" ry="3" fill="#D4A574"/>
  <circle cx="65" cy="119" r="1.3" fill="#E8B4B8"/>
  <circle cx="68" cy="120" r="1.3" fill="#E8B4B8"/>
  <circle cx="71" cy="119" r="1.3" fill="#E8B4B8"/>
  <!-- Front left leg (raised!) -->
  <rect x="42" y="90" width="8" height="14" rx="4" fill="#D4A574" transform="rotate(-30 46 97)"/>
  <ellipse cx="38" cy="88" rx="6" ry="4" fill="#E8C9A8" transform="rotate(-30 38 88)"/>
  <circle cx="35" cy="87" r="1.3" fill="#E8B4B8"/>
  <circle cx="38" cy="86" r="1.3" fill="#E8B4B8"/>
  <circle cx="41" cy="87" r="1.3" fill="#E8B4B8"/>
  <!-- Head -->
  <ellipse cx="60" cy="50" rx="26" ry="24" fill="#D4A574"/>
  <!-- Cheek blush -->
  <ellipse cx="40" cy="56" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <ellipse cx="80" cy="56" rx="6" ry="4" fill="#E8B4B8" opacity="0.5"/>
  <!-- M-mark -->
  <path d="M48 35 L52 29 L56 35" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M56 35 L60 29 L64 35" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M64 35 L68 29 L72 35" stroke="#C49668" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left ear (perked straight up) -->
  <path d="M36 38 L28 8 L50 30" fill="#D4A574"/>
  <path d="M38 36 L31 12 L48 30" fill="#E8B4B8"/>
  <!-- Right ear (perked straight up) -->
  <path d="M84 38 L92 8 L70 30" fill="#D4A574"/>
  <path d="M82 36 L89 12 L72 30" fill="#E8B4B8"/>
  <!-- Left eye (BIG, alert) -->
  <ellipse cx="50" cy="50" rx="8" ry="9" fill="white"/>
  <ellipse cx="51" cy="51" rx="5.5" ry="6" fill="#4A3F35"/>
  <circle cx="54" cy="48" r="2" fill="white"/>
  <circle cx="49" cy="54" r="1" fill="white"/>
  <!-- Right eye (BIG, alert) -->
  <ellipse cx="70" cy="50" rx="8" ry="9" fill="white"/>
  <ellipse cx="71" cy="51" rx="5.5" ry="6" fill="#4A3F35"/>
  <circle cx="74" cy="48" r="2" fill="white"/>
  <circle cx="69" cy="54" r="1" fill="white"/>
  <!-- Nose -->
  <path d="M58 58 L60 60 L62 58" fill="#D4918A" stroke="#D4918A" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Mouth (small O shape - alert) -->
  <ellipse cx="60" cy="64" rx="3" ry="2.5" fill="#D4918A" stroke="#4A3F35" stroke-width="0.8"/>
  <!-- Whiskers left -->
  <line x1="44" y1="56" x2="26" y2="52" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="44" y1="58" x2="26" y2="59" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="44" y1="60" x2="27" y2="66" stroke="#4A3F35" stroke-width="0.7"/>
  <!-- Whiskers right -->
  <line x1="76" y1="56" x2="94" y2="52" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="76" y1="58" x2="94" y2="59" stroke="#4A3F35" stroke-width="0.7"/>
  <line x1="76" y1="60" x2="93" y2="66" stroke="#4A3F35" stroke-width="0.7"/>
  <!-- Exclamation mark near raised paw -->
  <text x="20" y="80" font-family="sans-serif" font-size="14" font-weight="bold" fill="#B8845A">!</text>
</svg>