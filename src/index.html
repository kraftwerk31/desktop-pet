<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>桌面宠物 - 你的小伙伴</title>
  <link rel="stylesheet" href="css/pet.css">
</head>
<body>

  <!-- Pet Container -->
  <div id="pet-container">
    <div id="pet-character" class="idle">
      <!-- Sprite image rendered by SpriteManager -->
      <img id="pet-sprite" src="" alt="" draggable="false">
      <!-- Mood bar -->
      <div class="mood-bar"><div class="mood-bar-fill"></div></div>
    </div>

    <!-- Close button (top-right of pet) -->
    <button id="pet-close" class="pet-close-btn" title="再见~"></button>

    <!-- Speech Bubble -->
    <div id="speech-bubble"></div>

  </div>

  <!-- Settings Panel -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-header">
      <span class="settings-title">
        <svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        设置
      </span>
      <button id="settings-close" class="settings-close-btn">&times;</button>
    </div>

    <div class="settings-body">
      <!-- Mode Selection -->
      <div class="setting-group">
        <label class="setting-label">
          <span class="setting-emoji">🐾</span>
          模式选择
        </label>
        <div class="mode-btns">
          <button class="mode-btn active" data-mode="companion">陪伴</button>
          <button class="mode-btn" data-mode="reminder">提醒</button>
        </div>
        <p id="mode-desc" class="mode-description">猫咪在桌面上走来走去，到时间走过来提醒你。</p>
      </div>

      <!-- Personality Selection -->
      <div class="setting-group">
        <label class="setting-label">
          <span class="setting-emoji">🐱</span>
          性格选择
        </label>
        <div class="personality-btns">
          <button class="personality-btn active" data-personality="clingy">🥺 粘人精</button>
          <button class="personality-btn" data-personality="tsundere">😏 傲娇毒舌</button>
          <button class="personality-btn" data-personality="energetic">✨ 元气夸夸</button>
          <button class="personality-btn" data-personality="dramatic">🎭 戏精</button>
        </div>
        <p id="personality-desc" class="mode-description">你就是我的一切！不要离开我~</p>
      </div>

      <!-- Health Reminder Settings -->
      <div class="setting-group">
        <label class="setting-label open" data-target="health-content">
          <span class="setting-emoji">💤</span>
          健康提醒
          <span class="collapse-arrow">▼</span>
        </label>
        <div class="setting-content" id="health-content">
          <div class="setting-group" style="margin-bottom:10px">
            <label class="setting-label" style="cursor:default">
              <span class="setting-emoji" style="font-size:12px">💤</span>
              休息活动
            </label>
            <div class="setting-slider">
              <input type="range" id="break-interval" min="15" max="120" value="45" step="5">
              <span id="break-value" class="slider-value">45分钟</span>
            </div>
          </div>
          <div class="setting-group" style="margin-bottom:0">
            <label class="setting-label" style="cursor:default">
              <span class="setting-emoji" style="font-size:12px">💧</span>
              喝水提醒
            </label>
            <div class="setting-slider">
              <input type="range" id="water-interval" min="10" max="90" value="30" step="5">
              <span id="water-value" class="slider-value">30分钟</span>
            </div>
          </div>
        </div>
      </div>

      <!-- General Settings -->
      <div class="setting-group">
        <label class="setting-label">
          <span class="setting-emoji">&#9881;</span>
          通用设置
        </label>
        <div class="toggle-row">
          <span class="toggle-label">开机自动启动</span>
          <label class="toggle-switch">
            <input type="checkbox" id="auto-start-toggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- Stats -->
      <div class="setting-group stats-section">
        <div class="stats-grid stats-grid-4">
          <div class="stat-item">
            <span class="stat-value" id="stat-days">1</span>
            <span class="stat-label">连续陪伴</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="stat-bond">LV.1</span>
            <span class="stat-label" id="stat-bond-title">新朋友</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="stat-interactions">0</span>
            <span class="stat-label">互动次数</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="stat-mood">60</span>
            <span class="stat-label" id="stat-mood-label">还不错</span>
          </div>
        </div>
      </div>

      <!-- Analytics -->
      <div class="setting-group analytics-section">
        <label class="setting-label">
          <span class="setting-emoji">&#128202;</span>
          今日数据
        </label>
        <div class="analytics-grid">
          <div class="analytics-item">
            <span class="analytics-value" id="analytics-response-rate">--</span>
            <span class="analytics-label">提醒响应率</span>
          </div>
          <div class="analytics-item">
            <span class="analytics-value" id="analytics-session-time">--</span>
            <span class="analytics-label">使用时长</span>
          </div>
          <div class="analytics-item">
            <span class="analytics-value" id="analytics-today-reminders">--</span>
            <span class="analytics-label">提醒次数</span>
          </div>
          <div class="analytics-item">
            <span class="analytics-value" id="analytics-today-interactions">--</span>
            <span class="analytics-label">互动次数</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/personalities.js"></script>
  <script src="js/growth.js"></script>
  <script src="js/sprite-manager.js"></script>
  <script src="js/pet.js"></script>
  <script src="js/pet-movement.js"></script>
  <script src="js/pet-interaction.js"></script>
  <script src="js/pet-intro.js"></script>
  <script src="js/pet-health.js"></script>
  <script src="js/renderer.js"></script>
</body>
</html>
